<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Scout | Box Score & Deep Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print, #rawDumpSection { display: none; } }
        .game-card { break-inside: avoid; }
        .data-label { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-slate-900 text-white p-6 shadow-xl no-print">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black italic tracking-tighter">MLB<span class="text-sky-400">DATA</span>SCOUT</h1>
            <div class="flex items-center gap-3">
                <input type="date" id="datePicker" class="text-slate-900 p-2 rounded font-bold text-sm">
                <button onclick="fetchGames()" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded font-bold transition">Process</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="status" class="hidden mb-6 p-4 rounded-lg bg-sky-100 text-sky-800 text-center animate-pulse font-bold">Connecting...</div>

        <section id="rawDumpSection" class="hidden mb-12">
            <div class="flex justify-between items-center mb-2">
                <h2 class="data-label">AI Analysis Buffer (Deep Data)</h2>
                <button onclick="copyRaw()" class="text-xs text-sky-600 font-bold uppercase tracking-tighter">Copy for AI →</button>
            </div>
            <textarea id="rawTextArea" class="w-full h-48 p-4 text-[11px] font-mono bg-slate-800 text-slate-300 rounded-xl border-none" readonly></textarea>
        </section>

        <div id="gamesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const PROXY = "https://corsproxy.io/?";
        // Default to yesterday
        const d = new Date(); d.setDate(d.getDate() - 1);
        document.getElementById('datePicker').value = d.toISOString().split('T')[0];

        function copyRaw() { document.getElementById('rawTextArea').select(); document.execCommand('copy'); alert("Copied to clipboard!"); }

        async function fetchGames() {
            const date = document.getElementById('datePicker').value;
            const container = document.getElementById('gamesContainer');
            const rawText = document.getElementById('rawTextArea');
            const status = document.getElementById('status');

            status.classList.remove('hidden');
            container.innerHTML = '';
            let buffer = `MLB SCOUT REPORT: ${date}\n==============================\n`;

            try {
                // Hydrating linescore for Box Score and probablePitcher for Pre-game
                const schedUrl = `${PROXY}https://statsapi.mlb.com/api/v1/schedule/games/?sportId=1&startDate=${date}&endDate=${date}&hydrate=probablePitcher,linescore,team`;
                const schedRes = await fetch(schedUrl);
                const schedData = await schedRes.json();

                if (!schedData.dates?.[0]) { status.innerText = "No games found."; return; }

                for (const game of schedData.dates[0].games) {
                    status.innerText = `Fetching ${game.teams.away.team.name}...`;

                    // Fetch the Content (The Recap/Preview Text)
                    const contentRes = await fetch(`${PROXY}https://statsapi.mlb.com/api/v1/game/${game.gamePk}/content`);
                    const content = await contentRes.json();

                    // Fallback Chain for Text: 
                    // 1. Recap Body -> 2. Preview Body -> 3. Headline/Summary -> 4. SEO Description
                    const deepText = content.editorial?.recap?.home?.body || 
                                     content.editorial?.preview?.home?.body || 
                                     content.editorial?.articles?.items?.[0]?.body ||
                                     content.editorial?.recap?.home?.summary || "No detailed narrative available for this game yet.";

                    const cleanText = deepText.replace(/<[^>]*>?/gm, ''); // Strips HTML

                    // Box Score Data
                    const away = game.teams.away;
                    const home = game.teams.home;
                    const awayBox = `R:${game.linescore?.teams?.away?.runs || 0} H:${game.linescore?.teams?.away?.hits || 0} E:${game.linescore?.teams?.away?.errors || 0}`;
                    const homeBox = `R:${game.linescore?.teams?.home?.runs || 0} H:${game.linescore?.teams?.home?.hits || 0} E:${game.linescore?.teams?.home?.errors || 0}`;

                    // Update the AI Buffer
                    buffer += `\n[GAME]: ${away.team.name} @ ${home.team.name}\n`;
                    buffer += `[STATUS]: ${game.status.detailedState}\n`;
                    buffer += `[BOX SCORE]: Away(${awayBox}) | Home(${homeBox})\n`;
                    buffer += `[PITCHERS]: ${away.probablePitcher?.fullName || 'TBD'} vs ${home.probablePitcher?.fullName || 'TBD'}\n`;
                    buffer += `[NARRATIVE]: ${cleanText.substring(0, 1500)}...\n`; // Grabs first 1500 chars
                    buffer += `------------------------------\n`;

                    // Build Card
                    const card = document.createElement('div');
                    card.className = "game-card bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col";
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase">${game.status.detailedState}</span>
                            <span class="text-[10px] font-mono text-slate-300">#${game.gamePk}</span>
                        </div>
                        <div class="flex justify-between items-center mb-6">
                            <div class="w-2/5 text-center">
                                <p class="text-xs font-bold truncate">${away.team.name}</p>
                                <p class="text-3xl font-black">${away.score ?? '-'}</p>
                                <p class="text-[9px] text-slate-400 font-mono">${awayBox}</p>
                            </div>
                            <div class="text-slate-200 font-black italic">VS</div>
                            <div class="w-2/5 text-center">
                                <p class="text-xs font-bold truncate">${home.team.name}</p>
                                <p class="text-3xl font-black">${home.score ?? '-'}</p>
                                <p class="text-[9px] text-slate-400 font-mono">${homeBox}</p>
                            </div>
                        </div>
                        <div class="border-t pt-3 mt-auto">
                            <p class="text-[10px] text-slate-500 mb-2"><strong>Starters:</strong> ${away.probablePitcher?.fullName || 'TBD'} / ${home.probablePitcher?.fullName || 'TBD'}</p>
                            <a href="https://www.mlb.com/gameday/${game.gamePk}" target="_blank" class="block w-full bg-slate-100 text-center py-2 rounded text-[10px] font-bold text-slate-600 hover:bg-sky-500 hover:text-white transition no-print">OPEN GAMEDAY</a>
                        </div>
                    `;
                    container.appendChild(card);
                }

                rawText.value = buffer;
                document.getElementById('rawDumpSection').classList.remove('hidden');
                status.classList.add('hidden');

            } catch (err) {
                console.error(err);
                status.innerText = "Error: API connection lost. Try refreshing.";
            }
        }
    </script>
</body>
</html>

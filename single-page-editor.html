<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Barebones Local-First Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { margin:0; font-family: system-ui; background:#111; color:#eee; }
  header, footer { padding:8px; background:#1a1a1a; border-bottom:1px solid #333; }
  footer { border-top:1px solid #333; border-bottom:none; font-size:12px; display:flex; gap:12px; }
  textarea { width:100%; height:calc(100vh - 120px); background:#0f0f0f; color:#eee; border:none; padding:8px; font-size:16px; resize:none; }
  button, select, input { background:#2a2a2a; color:#eee; border:1px solid #444; padding:6px 10px; border-radius:6px; margin-right:6px; }
</style>
</head>
<body>
<header>
  <button id="openBtn">Open</button>
  <button id="saveBtn">Save</button>
  <button id="saveAsBtn">Save As…</button>
  <select id="autosaveMode">
    <option value="on" selected>Autosave ON</option>
    <option value="off">Autosave OFF</option>
  </select>
  <select id="pasteMode">
    <option value="plain" selected>Plain</option>
    <option value="html-md">HTML → Markdown</option>
    <option value="html-raw">Raw HTML</option>
  </select>
  <input id="opfsPath" placeholder="OPFS path e.g. notes/today.txt" />
  <button id="opfsSaveBtn">OPFS Save</button>
  <button id="opfsOpenBtn">OPFS Open</button>
</header>

<textarea id="editor" placeholder="Start typing..."></textarea>

<footer>
  <span id="status">Ready</span>
</footer>

<script>
let fileHandle = null;
let autosave = true;
let autosaveTimer;
const editor = document.getElementById('editor');
const statusEl = document.getElementById('status');
const pasteModeEl = document.getElementById('pasteMode');
const opfsPathEl = document.getElementById('opfsPath');

// IndexedDB helpers
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('BarebonesEditorDB', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('drafts', { keyPath: 'id' });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbPut(db, text) {
  const tx = db.transaction('drafts', 'readwrite');
  tx.objectStore('drafts').put({ id: 'main', text, ts: Date.now() });
}
async function idbGet(db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('drafts', 'readonly');
    const req = tx.objectStore('drafts').get('main');
    req.onsuccess = () => resolve(req.result?.text || '');
    req.onerror = () => reject(req.error);
  });
}

// HTML → Markdown
function htmlToMarkdown(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) return node.nodeValue.replace(/\s+/g, ' ');
    if (node.nodeType !== Node.ELEMENT_NODE) return '';
    const name = node.tagName.toLowerCase();
    const inner = Array.from(node.childNodes).map(walk).join('');
    switch (name) {
      case 'b': case 'strong': return `**${inner}**`;
      case 'i': case 'em': return `*${inner}*`;
      case 'u': return `_${inner}_`;
      case 'br': return '\n';
      case 'p': return inner.trim() ? inner.trim() + '\n\n' : '\n\n';
      case 'h1': return `# ${inner}\n\n`;
      case 'h2': return `## ${inner}\n\n`;
      case 'h3': return `### ${inner}\n\n`;
      default: return inner;
    }
  }
  return walk(doc.body).trim();
}

// Boot
(async () => {
  const db = await idbOpen();
  editor.value = await idbGet(db);
  editor.addEventListener('input', () => {
    if (!autosave) return;
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => idbPut(db, editor.value), 500);
  });
  document.getElementById('autosaveMode').addEventListener('change', e => autosave = e.target.value === 'on');
})();

// Paste handling
editor.addEventListener('paste', e => {
  const mode = pasteModeEl.value;
  const plain = e.clipboardData?.getData('text/plain') || '';
  const html = e.clipboardData?.getData('text/html') || '';
  let insertText = plain;
  if (mode === 'html-raw' && html) insertText = html;
  if (mode === 'html-md' && html) insertText = htmlToMarkdown(html);
  if (insertText) {
    e.preventDefault();
    const start = editor.selectionStart, end = editor.selectionEnd;
    editor.setRangeText(insertText, start, end, 'end');
  }
});

// File System Access
async function openFile() {
  try {
    const [handle] = await window.showOpenFilePicker({ types: [{ description: 'Text', accept: { 'text/plain': ['.txt', '.md'] } }] });
    fileHandle = handle;
    const file = await fileHandle.getFile();
    editor.value = await file.text();
    statusEl.textContent = 'Opened: ' + file.name;
  } catch {}
}
async function saveFile() {
  try {
    if (!fileHandle) return saveFileAs();
    const writable = await fileHandle.createWritable();
    await writable.write(editor.value);
    await writable.close();
    statusEl.textContent = 'Saved';
  } catch {}
}
async function saveFileAs() {
  try {
    fileHandle = await window.showSaveFilePicker({ suggestedName: 'untitled.txt', types: [{ description: 'Text', accept: { 'text/plain': ['.txt', '.md'] } }] });
    await saveFile();
  } catch {}
}
document.getElementById('openBtn').addEventListener('click', openFile);
document.getElementById('saveBtn').addEventListener('click', saveFile);
document.getElementById('saveAsBtn').addEventListener('click', saveFileAs);

// OPFS
async function opfsWrite(path, contents) {
  const root = await navigator.storage.getDirectory();
  const parts = path.split('/').filter(Boolean);
  let dir = root;
  for (let i = 0; i < parts.length - 1; i++) dir = await dir.getDirectoryHandle(parts[i], { create: true });
  const fileName = parts[parts.length - 1];
  const file = await dir.getFileHandle(fileName, { create: true });
  const writable = await file.createWritable();
  await writable.write(contents);
  await writable.close();
}
async function opfsRead(path) {
  const root = await navigator.storage.getDirectory();
  const parts = path.split('/').filter(Boolean);
  let dir = root;
  for (let i = 0; i < parts.length - 1; i++) dir = await dir.getDirectoryHandle(parts[i]);
  const fileName = parts[parts.length - 1];
  const file = await dir.getFileHandle(fileName);
  const blob = await file.getFile();
  return await blob.text();
}
document.getElementById('opfsSaveBtn').addEventListener('click', async () => {
  const path = opfsPathEl.value.trim();
  if (!path) return;
  await opfsWrite(path, editor.value);
  statusEl.textContent = 'OPFS saved → ' + path;
});
document.getElementById('opfsOpenBtn').addEventListener('click', async () => {
  const path = opfsPathEl.value.trim();
  if (!path) return;
  try {
    editor.value = await opfsRead(path);
    statusEl.textContent = 'OPFS opened ← ' + path;
  } catch (e) {
    statusEl.textContent = 'OPFS open failed';
  }
});
</script>
</body>
</html>

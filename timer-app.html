<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Multi Timer</title>

<style>
    body {
        font-family: 'Orbitron', sans-serif;
        background: #050510;
        color: #00eaff;
        text-align: center;
        padding-top: 40px;
    }

    h1 {
        font-size: 55px;
        color: #00eaff;
        text-shadow: 0 0 20px #00eaff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 20px #00eaff; }
        to { text-shadow: 0 0 40px #00eaff; }
    }

    .timerBox {
        margin: 25px auto;
        padding: 20px;
        width: 350px;
        background: rgba(0, 0, 30, 0.7);
        border: 2px solid #ff00ff;
        border-radius: 15px;
        box-shadow: 0 0 25px #ff00ff;
    }

    .display {
        font-size: 70px;
        color: #ff00ff;
        text-shadow: 0 0 25px #ff00ff, 0 0 40px #ff00ff;
        margin-bottom: 15px;
    }

    input {
        padding: 10px;
        font-size: 20px;
        width: 120px;
        text-align: center;
        border: 2px solid #00eaff;
        background: #0f0f1a;
        color: #00eaff;
        border-radius: 10px;
        box-shadow: 0 0 10px #00eaff;
    }

    button {
        padding: 10px 20px;
        font-size: 20px;
        margin: 10px;
        cursor: pointer;
        background: #ff00ff;
        border: none;
        color: white;
        border-radius: 10px;
        text-shadow: 0 0 10px white;
        box-shadow: 0 0 20px #ff00ff;
    }

    button:hover {
        background: #ff33ff;
        box-shadow: 0 0 30px #ff33ff;
    }

    /* Alert animation */
    .alert {
        position: fixed;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        padding: 20px 40px;
        font-size: 40px;
        background: rgba(255, 0, 255, 0.2);
        border: 3px solid #ff00ff;
        border-radius: 15px;
        color: white;
        text-shadow: 0 0 15px #fff;
        transition: top 0.6s ease;
        box-shadow: 0 0 25px #ff00ff;
    }

    .alert.show {
        top: 40px;
    }
</style>
</head>

<body>

<h1>Neon Multi Timer</h1>

<div id="alertBox" class="alert"></div>

<!-- Timer 1 -->
<div class="timerBox">
    <h2>Timer 1</h2>
    <div id="display1" class="display">00:00</div>
    <input id="input1" type="number" placeholder="Minutes">
    <button onclick="startTimer(1)">Start</button>
    <button onclick="stopTimer(1)">Stop</button>
</div>

<!-- Timer 2 -->
<div class="timerBox">
    <h2>Timer 2</h2>
    <div id="display2" class="display">00:00</div>
    <input id="input2" type="number" placeholder="Minutes">
    <button onclick="startTimer(2)">Start</button>
    <button onclick="stopTimer(2)">Stop</button>
</div>

<!-- Timer 3 -->
<div class="timerBox">
    <h2>Timer 3</h2>
    <div id="display3" class="display">00:00</div>
    <input id="input3" type="number" placeholder="Minutes">
    <button onclick="startTimer(3)">Start</button>
    <button onclick="stopTimer(3)">Stop</button>
</div>

<script>
let timers = {};

function startTimer(id) {
    let minutes = parseInt(document.getElementById("input" + id).value);
    if (isNaN(minutes) || minutes <= 0) return;

    let totalSeconds = minutes * 60;

    timers[id] = setInterval(() => {
        totalSeconds--;

        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;

        document.getElementById("display" + id).innerText =
            (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);

        // Alerts
        if (totalSeconds === 600) showAlert("10 minutes left!");
        if (totalSeconds === 300) showAlert("5 minutes left!");
        if (totalSeconds === 60) showAlert("1 minute left!");

        if (totalSeconds <= 0) {
            clearInterval(timers[id]);
            showAlert("Time's up!");
        }
    }, 1000);
}

function stopTimer(id) {
    clearInterval(timers[id]);
}

function showAlert(msg) {
    let box = document.getElementById("alertBox");
    box.innerText = msg;
    box.classList.add("show");

    setTimeout(() => {
        box.classList.remove("show");
    }, 3000);
}
</script>

</body>
</html>

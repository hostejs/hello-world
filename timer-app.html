<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Multi Timer</title>

<style>
    body {
        font-family: 'Orbitron', sans-serif;
        background: #050510;
        color: #00eaff;
        text-align: center;
        padding-top: 40px;
    }

    h1 {
        font-size: 55px;
        color: #00eaff;
        text-shadow: 0 0 20px #00eaff;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 20px #00eaff; }
        to { text-shadow: 0 0 40px #00eaff; }
    }

    .timerBox {
        margin: 25px auto;
        padding: 20px;
        width: 350px;
        background: rgba(0, 0, 30, 0.7);
        border: 2px solid #ff00ff;
        border-radius: 15px;
        box-shadow: 0 0 25px #ff00ff;
    }

    .display {
        font-size: 70px;
        color: #ff00ff;
        text-shadow: 0 0 25px #ff00ff, 0 0 40px #ff00ff;
        margin-bottom: 15px;
    }

        padding: 10px;
        font-size: 20px;
        width: 120px;
        text-align: center;
        border: 2px solid #00eaff;
        background: #0f0f1a;
        color: #00eaff;
        border-radius: 10px;
        box-shadow: 0 0 10px #00eaff;
    }

    button {
        padding: 10px 20px;
        font-size: 20px;
        margin: 10px;
